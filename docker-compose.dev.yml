services:
  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      # Necessário em alguns sistemas (Windows/WSL2) para o file watcher
      # do React detectar mudanças via polling ao invés de eventos do SO
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  backend:
    build:
      target: dev
    ports:
      - "8000:8000" # acesse a API em http://localhost:8000
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev

  db:
    ports:
      - "3307:3306"
    volumes:
      - db_data_dev:/var/lib/mysql

volumes:
  db_data_dev:
