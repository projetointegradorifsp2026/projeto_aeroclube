services:
  frontend:
    build:
      target: production
    restart: unless-stopped

  backend:
    build:
      target: production
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 3
        --timeout 120
        --access-logfile -
        --error-logfile -
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    restart: unless-stopped

  db:
    restart: unless-stopped
    volumes:
      - db_data_prod:/var/lib/mysql

  # ---------------------------------------------------------------------------
  # NGINX — Reverse Proxy (apenas em produção)
  # ---------------------------------------------------------------------------
  # O Nginx é o único serviço com portas expostas para o mundo externo.
  # Ele recebe todas as requisições e distribui:
  #   /api/*    → backend (Django)
  #   /admin/*  → backend (Django Admin)
  #   /*        → frontend (arquivos estáticos React)
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - aeroclube_network

volumes:
  db_data_prod:
